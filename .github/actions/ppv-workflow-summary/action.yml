name: Create PPV workflow summary
description: Collects locally stored job reports and publishes one consolidated workflow report.
inputs:
  title:
    required: true
  ppv_config:
    required: true
  country:
    required: true
  artifact_pattern:
    required: true
  artifact_name:
    required: true
  new_user_status:
    required: false
    default: not-run
  sign_in_status:
    required: false
    default: not-run
  signed_in_status:
    required: false
    default: not-run
runs:
  using: composite
  steps:
    - name: Build workflow summary
      shell: bash
      env:
        REPORT_TITLE: ${{ inputs.title }}
        PPV_CONFIG: ${{ inputs.ppv_config }}
        COUNTRY: ${{ inputs.country }}
        NEW_USER_STATUS: ${{ inputs.new_user_status }}
        SIGN_IN_STATUS: ${{ inputs.sign_in_status }}
        SIGNED_IN_STATUS: ${{ inputs.signed_in_status }}
        ARTIFACT_PATTERN: ${{ inputs.artifact_pattern }}
      run: |
        set -euo pipefail
        report_dir=ppv-workflow-summary
        mkdir -p "$report_dir/job-artifacts"
        reports_root="${PPV_REPORTS_ROOT:-/tmp/ppv-reports}"
        run_reports_dir="${reports_root}/${GITHUB_RUN_ID}"
        if [ -d "$run_reports_dir" ]; then
          find "$run_reports_dir" -mindepth 1 -maxdepth 1 -type d -name "$ARTIFACT_PATTERN" -exec cp -R {} "$report_dir/job-artifacts/" \;
        else
          echo "No local PPV report directory found at $run_reports_dir"
        fi
        artifact_count="$(find "$report_dir/job-artifacts" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')"
        cat > "$report_dir/index.html" <<EOF
        <!doctype html><html><head><meta charset="utf-8"><title>$REPORT_TITLE</title></head><body>
        <h1>$REPORT_TITLE</h1><p><strong>PPV:</strong> $PPV_CONFIG &nbsp; <strong>Country:</strong> $COUNTRY</p>
        <table border="1" cellpadding="6"><tr><th>Stage</th><th>Status</th></tr>
        <tr><td>New user</td><td>$NEW_USER_STATUS</td></tr>
        <tr><td>Existing user — sign in during flow</td><td>$SIGN_IN_STATUS</td></tr>
        <tr><td>Existing user — already signed in</td><td>$SIGNED_IN_STATUS</td></tr></table>
        <p><strong>Local report path:</strong> $run_reports_dir</p>
        <p>Collected job report folders: $artifact_count</p><h2>Job report folders</h2><ul>
        EOF
        find "$report_dir/job-artifacts" -mindepth 1 -maxdepth 1 -type d -print | sort | while read -r directory; do
          printf '<li>%s</li>\n' "$(basename "$directory")" >> "$report_dir/index.html"
        done
        printf '</ul></body></html>\n' >> "$report_dir/index.html"
        {
          echo "## $REPORT_TITLE"
          echo
          echo "PPV: \`$PPV_CONFIG\` · Country: \`$COUNTRY\` · Collected local reports: **$artifact_count**"
          echo
          echo "Local report path: \`$run_reports_dir\`"
          echo
          echo '| Stage | Status |'
          echo '| --- | --- |'
          echo "| New user | $NEW_USER_STATUS |"
          echo "| Existing user — sign in during flow | $SIGN_IN_STATUS |"
          echo "| Existing user — already signed in | $SIGNED_IN_STATUS |"
          echo
          echo "Reports are stored on the self-hosted runner disk under the local report path above."
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Store consolidated workflow report locally
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
      run: |
        set -euo pipefail
        reports_root="${PPV_REPORTS_ROOT:-/tmp/ppv-reports}"
        summary_dir="${reports_root}/${GITHUB_RUN_ID}/${ARTIFACT_NAME}"
        rm -rf "$summary_dir"
        mkdir -p "$summary_dir"
        cp -R ppv-workflow-summary/. "$summary_dir/"
        echo "Stored consolidated workflow report locally at $summary_dir"
