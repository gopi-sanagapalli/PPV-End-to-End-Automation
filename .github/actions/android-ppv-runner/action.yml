name: Run Android PPV journey
inputs:
  journey: { required: true }
runs:
  using: composite
  steps:
    - shell: bash
      run: npm ci
    - shell: bash
      run: cd appium && npm ci
    - name: Verify assigned Android device
      shell: bash
      run: |
        set -euo pipefail
        adb start-server
        adb -s "$DEVICE_SERIAL" wait-for-device
        adb -s "$DEVICE_SERIAL" get-state | grep -qx device
    - if: ${{ env.PROFILE != '' }}
      shell: bash
      run: |
        IFS='/' read -r state plan <<< "$PROFILE"
        echo "USER_STATE=$state" >> "$GITHUB_ENV"
        echo "PLAN=$plan" >> "$GITHUB_ENV"
    - shell: bash
      run: |
        cd appium
        if [ "${{ inputs.journey }}" = "new-user" ]; then
          npx wdio run config/wdio.android.conf.ts --spec tests/android/ppv.handoff.spec.ts
        else
          npx wdio run config/wdio.android.conf.ts --spec tests/android/existingusermobile.ppv.spec.ts
        fi
    - name: Store Android test results locally
      if: ${{ always() }}
      shell: bash
      run: |
        set -euo pipefail
        report_id="${SOURCE}-${PROFILE:-$PLAN}"
        report_id="$(echo "$report_id" | tr '/ :|*?<>\"' '_' | tr -cd '[:alnum:]_.-')"
        report_name="ppv-android-${report_id}"
        reports_root="${PPV_REPORTS_ROOT:-/tmp/ppv-reports}"
        report_dir="${reports_root}/${GITHUB_RUN_ID}/${report_name}"
        mkdir -p "$report_dir"
        found=false
        for source_dir in appium/test-results appium/reports; do
          if [ -e "$source_dir" ]; then
            cp -R "$source_dir" "$report_dir/"
            found=true
          fi
        done
        if [ "$found" = false ]; then
          echo "No Android report folders found for $report_name"
        fi
        echo "Stored Android test results locally at $report_dir"
