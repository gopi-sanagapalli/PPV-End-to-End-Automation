name: Run generic PPV journey
inputs:
  journey:
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      run: npm ci
    - shell: bash
      run: npx playwright install chromium
    - if: ${{ env.PROFILE != '' }}
      shell: bash
      run: |
        IFS='/' read -r state plan <<< "$PROFILE"
        echo "USER_STATE=$state" >> "$GITHUB_ENV"
        echo "PLAN=$plan" >> "$GITHUB_ENV"
    - shell: bash
      run: |
        if [ "${{ inputs.journey }}" = "new-user" ]; then
          npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium --timeout=600000
        else
          npx playwright test tests/existing_user/existinguser.ppv.spec.ts --project=chromium --timeout=600000
        fi
    - name: Store Playwright reports locally
      if: ${{ always() }}
      shell: bash
      run: |
        set -euo pipefail
        report_id="${SOURCE}-${PROFILE:-$PLAN}"
        report_id="$(echo "$report_id" | tr '/ :|*?<>"' '_' | tr -cd '[:alnum:]_.-')"
        report_name="ppv-web-${report_id}"
        reports_root="${PPV_REPORTS_ROOT:-/tmp/ppv-reports}"
        report_dir="${reports_root}/${GITHUB_RUN_ID}/${report_name}"
        mkdir -p "$report_dir"
        found=false
        for source_dir in test-results playwright-report reports; do
          if [ -e "$source_dir" ]; then
            cp -R "$source_dir" "$report_dir/"
            found=true
          fi
        done
        if [ "$found" = false ]; then
          echo "No Playwright report folders found for $report_name"
        fi
        echo "Stored Playwright reports locally at $report_dir"
