name: Run generic PPV journey
inputs:
  journey:
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      run: npm ci
    - shell: bash
      run: npx playwright install chromium
    - if: ${{ env.PROFILE != '' }}
      shell: bash
      run: |
        IFS='/' read -r state plan <<< "$PROFILE"
        echo "USER_STATE=$state" >> "$GITHUB_ENV"
        echo "PLAN=$plan" >> "$GITHUB_ENV"
    - shell: bash
      run: |
        if [ "${{ inputs.journey }}" = "new-user" ]; then
          npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium --timeout=600000
        else
          npx playwright test tests/existing_user/existinguser.ppv.spec.ts --project=chromium --timeout=600000
        fi
    - name: Set report artifact name
      if: ${{ always() }}
      shell: bash
      run: |
        report_id="${SOURCE}-${PROFILE:-$PLAN}"
        report_id="$(echo "$report_id" | tr '/ :|*?<>"' '_' | tr -cd '[:alnum:]_.-')"
        echo "REPORT_ARTIFACT_NAME=ppv-web-${report_id}" >> "$GITHUB_ENV"
    - name: Upload Playwright reports
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.REPORT_ARTIFACT_NAME }}
        path: |
          test-results/
          playwright-report/
        if-no-files-found: warn
