name: "AE PROD — New User"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  prod:
    name: ${{ matrix.source }} | ${{ matrix.plan }}

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 20

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        source:
          - boxing-banner-ultimate
          - boxing-join-the-club
          - boxing-page-banner
          - boxing-page-bundle
          - boxing-standard-subscription
          - boxing-upcoming-fights
          - boxing-ultimate-subscription
          - home-biggest-fights
          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - home-kickboxing-tile
          - home-page-banner
          - home-page-dazntile
          - home-page-dont-miss
          - home-page-get-started
          - landing-page-banner
          - landing-page-dont-miss-live
          - schedule
          - search

        plan:
          - standard_monthly
          - ultimate_apm
          - ultimate_upfront

        include:
          # Switch route: explicit standard-plan jobs only
          - source: landing-page-dont-miss-live-switch
            plan: standard_monthly
            switch: 'true'
          - source: boxing-banner-ultimate
            plan: standard_monthly
          - source: boxing-join-the-club
            plan: standard_monthly
          - source: boxing-ultimate-subscription
            plan: standard_monthly
