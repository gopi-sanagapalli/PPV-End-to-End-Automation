name: "Android · GB · Prod · New user — schedule demo"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'ppv_t_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  prepare-matrix:
    name: Prepare schedule matrix
    runs-on:
      - self-hosted
      - macOS
      - X64
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build matrix
        id: matrix
        env:
          PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const configInput = process.env.PPV_CONFIG;
          const filename = path.basename(configInput).endsWith('.json')
            ? path.basename(configInput)
            : `${path.basename(configInput)}.json`;

          const findConfig = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isFile() && entry.name === filename) return fullPath;
              if (entry.isDirectory()) {
                const found = findConfig(fullPath);
                if (found) return found;
              }
            }
            return null;
          };

          const directPath = path.resolve(configInput);
          const eventPath = fs.existsSync(directPath)
            ? directPath
            : findConfig(path.resolve('config'));
          if (!eventPath) throw new Error(`PPV config not found: ${configInput}`);

          const event = JSON.parse(fs.readFileSync(eventPath, 'utf8'));
          console.log(`Event: ${event.eventKey || event.PPV_NAME || configInput}`);

          const source = 'schedule';
          const plans = ['standard_apm'];
          const devices = [
            { deviceSerial: 'RZCX22324AF', appiumPort: 4724, appiumSystemPort: 8201, chromedriverPort: 9516 },
          ];
          const matrix = [];
          for (let index = 0; index < plans.length; index++) {
            matrix.push({ source, plan: plans[index], ...devices[index % devices.length] });
          }

          console.log(`Source: ${source}`);
          console.log(`Plans: ${plans.join(', ')}`);
          console.log(`Total matrix jobs: ${matrix.length}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify(matrix)}\n`);
          NODE

  test-schedule:
    name: ${{ matrix.source }} | ${{ matrix.plan }}
    needs: prepare-matrix
    runs-on:
      - self-hosted
      - macOS
      - X64
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      CI: 'true'
      DAZN_REGION: GB
      DAZN_ENV: prod
      SOURCE: ${{ matrix.source }}
      PLAN: ${{ matrix.plan }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ matrix.switch || inputs.SWITCH }}
      DEVICE_SERIAL: ${{ matrix.deviceSerial }}
      APPIUM_PORT: ${{ matrix.appiumPort }}
      APPIUM_SYSTEM_PORT: ${{ matrix.appiumSystemPort }}
      CHROMEDRIVER_PORT: ${{ matrix.chromedriverPort }}

      # Jira validation custom field names and values
      JIRA_REGION_FIELD_NAME: Region
      JIRA_DAZN_ENVIRONMENT_FIELD_NAME: DAZN Environment
      JIRA_PLATFORM_FIELD_NAME: Platform - required
      JIRA_DAZN_ENVIRONMENT: Live Prod
      JIRA_PLATFORM: Android

      # Gemini AI and Jira ticket creation credentials
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      JIRA_BASE_URL: https://livesport.atlassian.net
      JIRA_PROJECT_KEY: QAR
      JIRA_ISSUE_TYPE: Bug
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Device: $DEVICE_SERIAL"
          echo "Appium port: $APPIUM_PORT"
          hostname
          echo "Commit: $(git rev-parse HEAD)"

      - name: Verify runner VPN and DAZN signin reachability
        shell: bash
        run: |
          set -euo pipefail
          IPINFO="$(curl -fsSL --max-time 15 https://ipinfo.io/json || true)"
          echo "$IPINFO"
          COUNTRY="$(printf '%s' "$IPINFO" | sed -n 's/.*"country"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
          if [ "$COUNTRY" != "$DAZN_REGION" ]; then
            echo "❌ Runner country is '$COUNTRY', expected '$DAZN_REGION'."
            exit 1
          fi

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Install Appium dependencies
        run: cd appium && npm ci

      - name: Verify Android Device
        shell: bash
        run: |
          whoami
          adb version
          adb start-server
          adb -s "$DEVICE_SERIAL" wait-for-device
          adb -s "$DEVICE_SERIAL" devices -l

      - name: Run Android Schedule Test
        shell: bash
        run: |
          set +e
          cd appium
          npx wdio run config/wdio.android.conf.ts --spec tests/android/ppv.handoff.spec.ts
          EXIT_CODE=$?
          echo "WDIO EXIT CODE = $EXIT_CODE"
          exit $EXIT_CODE

      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="${{ matrix.source }}-${{ matrix.plan }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"
          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi
          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi
