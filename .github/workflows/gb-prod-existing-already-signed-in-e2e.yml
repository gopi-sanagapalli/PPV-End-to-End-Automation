name: "GB PROD — Existing User — Already Signed In"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  prod:
    name: ${{ matrix.source }} | ${{ matrix.profile }}

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 20

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        source:
          - home-page-banner
          - home-page-dont-miss
          - home-biggest-fights
          - home-page-dazntile

          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - home-kickboxing-tile

          - boxing-page-banner
          - boxing-page-bundle
          - boxing-upcoming-fights
          - boxing-banner-ultimate
          - boxing-ultimate-subscription
          - boxing-standard-subscription
          - boxing-join-the-club

          - search
          - schedule
          - myaccount

        # Each profile encodes:  user_state/plan[/purchase_path]
        # 15 profiles × 20 sources = 300 base jobs
        profile:
          # Freemium — all four plans
          - freemium/standard_monthly
          - freemium/standard_apm
          - freemium/ultimate_apm
          - freemium/ultimate_upfront

          # Frozen — all four plans
          - frozen/standard_monthly
          - frozen/standard_apm
          - frozen/ultimate_apm
          - frozen/ultimate_upfront

          # Active Standard Monthly — standard_monthly = PPV only (no upgrade);
          # ultimate_apm / ultimate_upfront = upgrade then PPV
          - active_standard_monthly/standard_monthly
          - active_standard_monthly/ultimate_apm
          - active_standard_monthly/ultimate_upfront

          # Active Standard APM — ppv_only stays on standard_apm; upgrade to ult_apm
          - active_standard_apm/standard_apm
          - active_standard_apm/ultimate_apm

          # Active Ultimate — entitlement validation
          - active_ultimate_apm/ultimate_apm
          - active_ultimate_upfront/ultimate_upfront

        exclude:
          # boxing-banner-ultimate, boxing-ultimate-subscription, boxing-join-the-club
          # require an Ultimate upgrade journey. With standard/freemium event configs
          # (no TIER key), only active_standard × ultimate_* purchase paths pass the
          # spec guard. All other profiles throw at test start — exclude them.
          - { source: boxing-banner-ultimate,        profile: freemium/standard_monthly }
          - { source: boxing-banner-ultimate,        profile: freemium/standard_apm }
          - { source: boxing-banner-ultimate,        profile: freemium/ultimate_apm }
          - { source: boxing-banner-ultimate,        profile: freemium/ultimate_upfront }
          - { source: boxing-banner-ultimate,        profile: frozen/standard_monthly }
          - { source: boxing-banner-ultimate,        profile: frozen/standard_apm }
          - { source: boxing-banner-ultimate,        profile: frozen/ultimate_apm }
          - { source: boxing-banner-ultimate,        profile: frozen/ultimate_upfront }
          - { source: boxing-banner-ultimate,        profile: active_standard_monthly/standard_monthly }
          - { source: boxing-banner-ultimate,        profile: active_standard_apm/standard_apm }
          - { source: boxing-banner-ultimate,        profile: active_ultimate_apm/ultimate_apm }
          - { source: boxing-banner-ultimate,        profile: active_ultimate_upfront/ultimate_upfront }

          - { source: boxing-ultimate-subscription,  profile: freemium/standard_monthly }
          - { source: boxing-ultimate-subscription,  profile: freemium/standard_apm }
          - { source: boxing-ultimate-subscription,  profile: freemium/ultimate_apm }
          - { source: boxing-ultimate-subscription,  profile: freemium/ultimate_upfront }
          - { source: boxing-ultimate-subscription,  profile: frozen/standard_monthly }
          - { source: boxing-ultimate-subscription,  profile: frozen/standard_apm }
          - { source: boxing-ultimate-subscription,  profile: frozen/ultimate_apm }
          - { source: boxing-ultimate-subscription,  profile: frozen/ultimate_upfront }
          - { source: boxing-ultimate-subscription,  profile: active_standard_monthly/standard_monthly }
          - { source: boxing-ultimate-subscription,  profile: active_standard_apm/standard_apm }
          - { source: boxing-ultimate-subscription,  profile: active_ultimate_apm/ultimate_apm }
          - { source: boxing-ultimate-subscription,  profile: active_ultimate_upfront/ultimate_upfront }

          - { source: boxing-join-the-club,          profile: freemium/standard_monthly }
          - { source: boxing-join-the-club,          profile: freemium/standard_apm }
          - { source: boxing-join-the-club,          profile: freemium/ultimate_apm }
          - { source: boxing-join-the-club,          profile: freemium/ultimate_upfront }
          - { source: boxing-join-the-club,          profile: frozen/standard_monthly }
          - { source: boxing-join-the-club,          profile: frozen/standard_apm }
          - { source: boxing-join-the-club,          profile: frozen/ultimate_apm }
          - { source: boxing-join-the-club,          profile: frozen/ultimate_upfront }
          - { source: boxing-join-the-club,          profile: active_standard_monthly/standard_monthly }
          - { source: boxing-join-the-club,          profile: active_standard_apm/standard_apm }
          - { source: boxing-join-the-club,          profile: active_ultimate_apm/ultimate_apm }
          - { source: boxing-join-the-club,          profile: active_ultimate_upfront/ultimate_upfront }

        include:
          # home-page-subscribe: freemium only, all four plans
          - source: home-page-subscribe
            profile: freemium/standard_monthly
          - source: home-page-subscribe
            profile: freemium/standard_apm
          - source: home-page-subscribe
            profile: freemium/ultimate_apm
          - source: home-page-subscribe
            profile: freemium/ultimate_upfront

          # myaccount-subscription-status: freemium, all four plans
          - source: myaccount-subscription-status
            profile: freemium/standard_monthly
          - source: myaccount-subscription-status
            profile: freemium/standard_apm
          - source: myaccount-subscription-status
            profile: freemium/ultimate_apm
          - source: myaccount-subscription-status
            profile: freemium/ultimate_upfront

          # myaccount-subscription-status: frozen, all four plans
          - source: myaccount-subscription-status
            profile: frozen/standard_monthly
          - source: myaccount-subscription-status
            profile: frozen/standard_apm
          - source: myaccount-subscription-status
            profile: frozen/ultimate_apm
          - source: myaccount-subscription-status
            profile: frozen/ultimate_upfront

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: GB
      DAZN_ENV: prod
      LOGIN_FIRST: 'true'
      SOURCE: ${{ matrix.source }}
      PROFILE: ${{ matrix.profile }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ matrix.switch || inputs.SWITCH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname
          echo "Commit: $(git rev-parse HEAD)"

      - name: Verify runner VPN and DAZN signin reachability
        shell: bash
        run: |
          set -euo pipefail

          echo "=============================="
          echo "Runner network preflight"
          echo "Runner : $RUNNER_NAME"
          echo "Host   : $(hostname)"
          echo "Region : $DAZN_REGION"
          echo "=============================="

          if command -v scutil >/dev/null 2>&1; then
            echo "DNS:"
            scutil --dns | grep -E 'nameserver\[[0-9]+\]' | head -5 || true
          fi

          echo "Default route:"
          route -n get default 2>/dev/null | grep -E 'gateway|interface' || true

          echo "Public IP check:"
          IPINFO="$(curl -fsSL --max-time 15 https://ipinfo.io/json || true)"
          echo "$IPINFO"

          COUNTRY="$(printf '%s' "$IPINFO" | sed -n 's/.*"country"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
          if [ "$COUNTRY" != "$DAZN_REGION" ]; then
            echo "❌ Runner public IP country is '$COUNTRY', expected '$DAZN_REGION'. Check the VPN on this runner before running DAZN PROD."
            exit 1
          fi

          echo "DAZN signin HTTP check:"
          curl -fsSIL --max-time 30 "https://www.dazn.com/en-GB/signin" | sed -n '1,12p'

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci

      - name: Verify Playwright
        run: npx playwright --version

      - name: Set USER_STATE and PLAN from matrix profile
        run: |
          IFS='/' read -r _US _PL <<< "$PROFILE"
          echo "USER_STATE=${_US}" >> $GITHUB_ENV
          echo "PLAN=${_PL}"       >> $GITHUB_ENV

      - name: Log matrix context
        run: |
          echo "=============================="
          echo "SOURCE      = $SOURCE"
          echo "USER_STATE  = $USER_STATE"
          echo "PLAN        = $PLAN"
          echo "LOGIN_FIRST = $LOGIN_FIRST"
          echo "SWITCH      = $SWITCH"
          echo "=============================="

      - name: Run PROD PPV Flow
        run: npx playwright test tests/existing_user/existinguser.ppv.spec.ts --project=chromium --timeout=600000

      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="${{ matrix.source }}-${{ matrix.profile }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"

          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"

          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi

          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi

          if [ -d playwright-report ]; then
            mkdir -p "$DEST/playwright-report"
            cp -R playwright-report/. "$DEST/playwright-report/"
          fi

          echo "=================================================="
          echo "LOCAL REPORT ARCHIVE SAVED"
          echo "Runner machine : $(hostname)"
          echo "Folder         : $DEST"
          echo "=================================================="

      - name: Upload Playwright Report
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.source }}-${{ matrix.profile }}-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.source }}-${{ matrix.profile }}-${{ github.run_id }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
