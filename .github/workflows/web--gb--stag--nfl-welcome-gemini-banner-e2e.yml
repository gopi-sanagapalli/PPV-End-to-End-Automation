name: "Web · GB · Stag · NFL welcome Gemini banner"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-validation:
    name: Gemini banner validation
    runs-on: macos-14
    # This provides the approved Gemini secret; the page under test remains staging.
    environment:
      name: prod
    timeout-minutes: 15
    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: GB
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Validate NFL welcome banner artwork
        run: npx playwright test tests/visual/nflWelcomeBanner.gemini.spec.ts --project=chromium

      - name: Upload Gemini evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-banner-evidence
          path: test-results/gemini-banner/
          if-no-files-found: warn
