name: "US PROD — Zayas vs Boots — New User"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'zayas_boots.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  prod:
    name: ${{ matrix.source }} | ${{ matrix.plan }}

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 20

    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        source:
          - boxing-banner-ultimate
          - boxing-join-the-club
          - boxing-page-banner
          - boxing-page-bundle
          - boxing-standard-subscription
          - boxing-upcoming-fights
          - boxing-ultimate-subscription
          - home-biggest-fights
          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - home-kickboxing-tile
          - home-page-banner
          - home-page-dazntile
          - home-page-dont-miss
          - home-page-get-started
          - landing-page-banner
          - landing-page-dont-miss-live
          - schedule
          - search

        plan:
          - standard_monthly
          - standard_apm
          - ultimate_apm
          - ultimate_upfront

        include:
          # Switch route: explicit standard-plan jobs only
          - source: landing-page-dont-miss-live-switch
            plan: standard_monthly
            switch: 'true'
          - source: landing-page-dont-miss-live-switch
            plan: standard_apm
            switch: 'true'

        exclude:
          # Ultimate-only boxing sources
          - source: boxing-banner-ultimate
            plan: standard_monthly
          - source: boxing-banner-ultimate
            plan: standard_apm
          - source: boxing-join-the-club
            plan: standard_monthly
          - source: boxing-join-the-club
            plan: standard_apm
          - source: boxing-ultimate-subscription
            plan: standard_monthly
          - source: boxing-ultimate-subscription
            plan: standard_apm

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: US
      DAZN_ENV: prod
      SOURCE: ${{ matrix.source }}
      PLAN: ${{ matrix.plan }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ matrix.switch || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Run PROD PPV Flow
        run: npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium


      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="${{ matrix.source }}-${{ matrix.plan }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"

          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"

          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi

          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi

          if [ -d playwright-report ]; then
            mkdir -p "$DEST/playwright-report"
            cp -R playwright-report/. "$DEST/playwright-report/"
          fi

          echo "=================================================="
          echo "LOCAL REPORT ARCHIVE SAVED"
          echo "Runner machine : $(hostname)"
          echo "Folder         : $DEST"
          echo "=================================================="

      - name: Upload Playwright Report
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.plan }}-${{ github.run_id }}-${{ github.job }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.plan }}-${{ github.run_id }}-${{ github.job }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
