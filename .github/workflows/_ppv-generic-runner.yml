name: _PPV generic runner
on:
  workflow_call:
    inputs:
      journey: { required: true, type: string }
      country: { required: true, type: string }
      ppv_config: { required: true, type: string }
      source: { required: true, type: string }
      plan: { required: false, type: string, default: '' }
      profile: { required: false, type: string, default: '' }
      login_first: { required: true, type: string }
      dev_mode_on: { required: true, type: string }
      switch: { required: false, type: string, default: 'false' }
jobs:
  run:
    name: ${{ inputs.journey }} | ${{ inputs.source }} | ${{ inputs.profile || inputs.plan }}
    runs-on: [self-hosted, macOS, ARM64, sridevi-runners]
    timeout-minutes: 30
    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.country }}
      PPV_CONFIG: ${{ inputs.ppv_config }}
      SOURCE: ${{ inputs.source }}
      PLAN: ${{ inputs.plan }}
      PROFILE: ${{ inputs.profile }}
      LOGIN_FIRST: ${{ inputs.login_first }}
      DEV_MODE_ON: ${{ inputs.dev_mode_on }}
      SWITCH: ${{ inputs.switch }}
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright install chromium
      - name: Set existing-user profile
        if: ${{ inputs.profile != '' }}
        shell: bash
        run: |
          IFS='/' read -r state plan <<< "$PROFILE"
          echo "USER_STATE=$state" >> "$GITHUB_ENV"
          echo "PLAN=$plan" >> "$GITHUB_ENV"
      - name: Run PPV journey
        shell: bash
        run: |
          if [ "${{ inputs.journey }}" = "new-user" ]; then
            npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium --timeout=600000
          else
            npx playwright test tests/existing_user/existinguser.ppv.spec.ts --project=chromium --timeout=600000
          fi
