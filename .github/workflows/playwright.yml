name: Web PPV New User Matrix

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      DAZN_REGION:
        description: 'DAZN region to validate'
        required: true
        default: 'GB'
        type: choice
        options:
          - AU
          - GB
          - UAE
          - US
          - BR
      PLAN:
        description: 'Plan key from config/DaznPlan.json'
        required: true
        default: 'standard_monthly'
      PPV_CONFIG:
        description: 'PPV config filename/key, for example aj_joshua_prenga.json'
        required: true
        default: 'aj_joshua_prenga.json'
      PAYMENT_METHOD:
        description: 'Payment method used on stag payment flow'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay
      SWITCH:
        description: 'On stag standard flows, switch to Ultimate from payment upsell banner'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  new-user-web:
    name: ${{ matrix.dazn_env }} | ${{ matrix.source }}
    timeout-minutes: 45
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        dazn_env: [stag, prod]
        source:
          - home-page-get-started
          - landing-page-banner
          - landing-page-dont-miss-live
          - boxing-page-banner
          - boxing-page-bundle
          - boxing-upcoming-fights
          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - search
          - schedule
          - home-kickboxing-tile
          - home-page-banner
          - home-page-dont-miss
          - home-biggest-fights

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: ${{ inputs.DAZN_REGION == 'UAE' && 'AE' || inputs.DAZN_REGION || 'GB' }}
      DAZN_ENV: ${{ matrix.dazn_env }}
      PLAN: ${{ inputs.PLAN || 'standard_monthly' }}
      SOURCE: ${{ matrix.source }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG || 'aj_joshua_prenga.json' }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD || 'credit_card' }}
      SWITCH: ${{ inputs.SWITCH || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium chrome

      - name: Run new-user web PPV flow
        run: npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.dazn_env }}-${{ matrix.source }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results, screenshots, videos, and Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dazn_env }}-${{ matrix.source }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
          retention-days: 30
