name: "GB PROD — AJ Joshua vs Prenga — Existing User — Sign In During Flow"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'
        type: string

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  prod:
    name: ${{ matrix.source }} | ${{ matrix.user_state }} | ${{ matrix.plan }} | ${{ matrix.purchase_path || 'default' }}
    timeout-minutes: 10
    runs-on:
      - self-hosted
      - macOS
      - ARM64

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        source:
          - landing-page-banner
          - landing-page-dont-miss-live
          - home-page-banner
          - home-page-dont-miss
          - home-biggest-fights
          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - home-kickboxing-tile
          - boxing-page-banner
          - boxing-page-bundle
          - boxing-upcoming-fights
          - search
          - schedule
          - myaccount
          - glory
        include:
          # ── Switch route: standard plans only ───────────────────────
          - source: landing-page-dont-miss-live-switch
            plan: standard_monthly
            switch: 'true'
          - source: landing-page-dont-miss-live-switch
            plan: standard_apm
            switch: 'true'

          # ── Freemium — all 4 plans ──────────────────────────────────
          - user_state: freemium
            plan: standard_monthly
          - user_state: freemium
            plan: standard_apm
          - user_state: freemium
            plan: ultimate_apm
          - user_state: freemium
            plan: ultimate_upfront

          # ── Frozen — all 4 plans ────────────────────────────────────
          - user_state: frozen
            plan: standard_monthly
          - user_state: frozen
            plan: standard_apm
          - user_state: frozen
            plan: ultimate_apm
          - user_state: frozen
            plan: ultimate_upfront

          # ── Active Standard Monthly — purchase path variants ────────
          - user_state: active_standard_monthly
            plan: standard_monthly
            purchase_path: ppv_only
          - user_state: active_standard_monthly
            plan: standard_monthly
            purchase_path: ultimate_monthly
          - user_state: active_standard_monthly
            plan: standard_monthly
            purchase_path: ultimate_upfront

          # ── Active Standard APM — purchase path variants ────────────
          - user_state: active_standard_apm
            plan: standard_apm
            purchase_path: ppv_only
          - user_state: active_standard_apm
            plan: standard_apm
            purchase_path: ultimate_apm

          # ── Active Ultimate — entitlement validation ─────────────────
          - user_state: active_ultimate_apm
            plan: ultimate_apm
          - user_state: active_ultimate_upfront
            plan: ultimate_upfront

          # ── home-page-get-started: freemium only, all 4 plans ───────
          - source: home-page-get-started
            user_state: freemium
            plan: standard_monthly
          - source: home-page-get-started
            user_state: freemium
            plan: standard_apm
          - source: home-page-get-started
            user_state: freemium
            plan: ultimate_apm
          - source: home-page-get-started
            user_state: freemium
            plan: ultimate_upfront

          # ── home-page-dazntile: freemium only, all 4 plans ──────────
          - source: home-page-dazntile
            user_state: freemium
            plan: standard_monthly
          - source: home-page-dazntile
            user_state: freemium
            plan: standard_apm
          - source: home-page-dazntile
            user_state: freemium
            plan: ultimate_apm
          - source: home-page-dazntile
            user_state: freemium
            plan: ultimate_upfront

          # ── home-page-subscribe: freemium only, all 4 plans ─────────
          - source: home-page-subscribe
            user_state: freemium
            plan: standard_monthly
          - source: home-page-subscribe
            user_state: freemium
            plan: standard_apm
          - source: home-page-subscribe
            user_state: freemium
            plan: ultimate_apm
          - source: home-page-subscribe
            user_state: freemium
            plan: ultimate_upfront

          # ── myaccount-subscription-status: freemium, all 4 plans ────
          - source: myaccount-subscription-status
            user_state: freemium
            plan: standard_monthly
          - source: myaccount-subscription-status
            user_state: freemium
            plan: standard_apm
          - source: myaccount-subscription-status
            user_state: freemium
            plan: ultimate_apm
          - source: myaccount-subscription-status
            user_state: freemium
            plan: ultimate_upfront

          # ── myaccount-subscription-status: frozen, all 4 plans ──────
          - source: myaccount-subscription-status
            user_state: frozen
            plan: standard_monthly
          - source: myaccount-subscription-status
            user_state: frozen
            plan: standard_apm
          - source: myaccount-subscription-status
            user_state: frozen
            plan: ultimate_apm
          - source: myaccount-subscription-status
            user_state: frozen
            plan: ultimate_upfront

          # ── boxing-banner-ultimate: ultimate plans only ──────────────
          - source: boxing-banner-ultimate
            user_state: freemium
            plan: ultimate_apm
          - source: boxing-banner-ultimate
            user_state: freemium
            plan: ultimate_upfront
          - source: boxing-banner-ultimate
            user_state: frozen
            plan: ultimate_apm
          - source: boxing-banner-ultimate
            user_state: frozen
            plan: ultimate_upfront
          - source: boxing-banner-ultimate
            user_state: active_ultimate_apm
            plan: ultimate_apm
          - source: boxing-banner-ultimate
            user_state: active_ultimate_upfront
            plan: ultimate_upfront

          # ── boxing-ultimate-subscription: ultimate plans only ────────
          - source: boxing-ultimate-subscription
            user_state: freemium
            plan: ultimate_apm
          - source: boxing-ultimate-subscription
            user_state: freemium
            plan: ultimate_upfront
          - source: boxing-ultimate-subscription
            user_state: frozen
            plan: ultimate_apm
          - source: boxing-ultimate-subscription
            user_state: frozen
            plan: ultimate_upfront
          - source: boxing-ultimate-subscription
            user_state: active_ultimate_apm
            plan: ultimate_apm
          - source: boxing-ultimate-subscription
            user_state: active_ultimate_upfront
            plan: ultimate_upfront

          # ── boxing-join-the-club: ultimate plans only ────────────────
          - source: boxing-join-the-club
            user_state: freemium
            plan: ultimate_apm
          - source: boxing-join-the-club
            user_state: freemium
            plan: ultimate_upfront
          - source: boxing-join-the-club
            user_state: frozen
            plan: ultimate_apm
          - source: boxing-join-the-club
            user_state: frozen
            plan: ultimate_upfront
          - source: boxing-join-the-club
            user_state: active_ultimate_apm
            plan: ultimate_apm
          - source: boxing-join-the-club
            user_state: active_ultimate_upfront
            plan: ultimate_upfront

          # ── boxing-standard-subscription: standard plans only ────────
          - source: boxing-standard-subscription
            user_state: freemium
            plan: standard_monthly
          - source: boxing-standard-subscription
            user_state: freemium
            plan: standard_apm
          - source: boxing-standard-subscription
            user_state: frozen
            plan: standard_monthly
          - source: boxing-standard-subscription
            user_state: frozen
            plan: standard_apm
          - source: boxing-standard-subscription
            user_state: active_standard_monthly
            plan: standard_monthly
            purchase_path: ppv_only
          - source: boxing-standard-subscription
            user_state: active_standard_apm
            plan: standard_apm
            purchase_path: ppv_only

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: GB
      DAZN_ENV: prod
      LOGIN_FIRST: 'true'
      SOURCE: ${{ matrix.source }}
      USER_STATE: ${{ matrix.user_state }}
      PLAN: ${{ matrix.plan }}
      PURCHASE_PATH: ${{ matrix.purchase_path || 'default' }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ matrix.switch || inputs.SWITCH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci

      - name: Verify Playwright
        run: npx playwright --version

      - name: Run PROD PPV Flow
        run: npx playwright test tests/existing_user/existinguser.ppv.spec.ts --project=chromium

      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="${{ matrix.source }}-${{ matrix.user_state }}-${{ matrix.plan }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"

          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"

          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi

          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi

          if [ -d playwright-report ]; then
            mkdir -p "$DEST/playwright-report"
            cp -R playwright-report/. "$DEST/playwright-report/"
          fi

          echo "=================================================="
          echo "LOCAL REPORT ARCHIVE SAVED"
          echo "Runner machine : $(hostname)"
          echo "Folder         : $DEST"
          echo "=================================================="

      - name: Upload Playwright Report
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.source }}-${{ matrix.user_state }}-${{ matrix.plan }}-${{ matrix.purchase_path || 'default' }}-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.source }}-${{ matrix.user_state }}-${{ matrix.plan }}-${{ matrix.purchase_path || 'default' }}-${{ github.run_id }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
