name: "Web · GB · Prod · Joshua vs. Prenga · Default Signup Dev Mode · New user"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'ppv_t_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  prepare-matrix:
    name: Prepare source matrix

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 10

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      dev_mode_on: ${{ steps.matrix.outputs.dev_mode_on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build applicable source matrix
        id: matrix
        env:
          PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const configInput = process.env.PPV_CONFIG;
          const filename = path.basename(configInput).endsWith('.json')
            ? path.basename(configInput)
            : `${path.basename(configInput)}.json`;

          const findConfig = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isFile() && entry.name === filename) return fullPath;
              if (entry.isDirectory()) {
                const found = findConfig(fullPath);
                if (found) return found;
              }
            }
            return null;
          };

          const directPath = path.resolve(configInput);
          const eventPath = fs.existsSync(directPath)
            ? directPath
            : findConfig(path.resolve('config'));
          if (!eventPath) throw new Error(`PPV config not found: ${configInput}`);

          const event = JSON.parse(fs.readFileSync(eventPath, 'utf8'));
          const sourceConfig = JSON.parse(fs.readFileSync('config/surfacingpoint.json', 'utf8'));
          const sport = String(event.SPORT || '').trim().toLowerCase();
          const hasBundle = event.HAS_BUNDLE === true;
          const defaultSignupDevMode = event.DEFAULT_SIGNUP_DEVMODE === true;

          if (!defaultSignupDevMode) {
            throw new Error(`DEFAULT_SIGNUP_DEVMODE is not true in ${configInput}. This workflow is only for PPVs configured in default signup dev mode.`);
          }

          // Only include sources that have defaultSignup: true
          // Exclude sources not applicable for new user flows
          const NOT_APPLICABLE_NEW_USER = new Set(['myaccount-subscription-status', 'home-page-subscribe']);
          const allSources = Object.keys(sourceConfig);
          const sources = allSources.filter((source) => {
            if (!sourceConfig[source]?.defaultSignup) return false;
            if (NOT_APPLICABLE_NEW_USER.has(source)) return false;
            if (source === 'home-kickboxing-tile' && sport !== 'kickboxing') return false;
            if (source === 'boxing-page-bundle' && !hasBundle) return false;
            return true;
          });

          const defaultPlans = ['standard_monthly', 'standard_apm', 'ultimate_apm', 'ultimate_upfront'];
          // subscribe-without-pay-per-view only needs one plan coverage
          const SINGLE_PLAN_SOURCES = new Set(['subscribe-without-pay-per-view']);
          const matrix = [];
          for (const source of sources) {
            const plans = SINGLE_PLAN_SOURCES.has(source) ? ['standard_monthly'] : defaultPlans;
            for (const plan of plans) {
              matrix.push({ source, plan });
            }
          }

          console.log(`Event: ${event.eventKey || event.PPV_NAME || configInput}`);
          console.log(`DEFAULT_SIGNUP_DEVMODE=true — restricting to defaultSignup sources only`);
          console.log(`Scheduled sources (${sources.length}): ${sources.join(', ')}`);
          console.log(`Total matrix jobs: ${matrix.length}`);
          // DEFAULT_SIGNUP_DEVMODE implies dev mode is always on
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify(matrix)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'dev_mode_on=on\n');
          NODE

  prod:
    name: ${{ matrix.source }} | ${{ matrix.plan }}

    needs: prepare-matrix

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 20

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: GB
      DAZN_ENV: prod
      DEV_MODE_ON: ${{ needs.prepare-matrix.outputs.dev_mode_on }}
      SOURCE: ${{ matrix.source }}
      PLAN: ${{ matrix.plan }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ matrix.switch || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Run PROD PPV Flow
        shell: bash
        run: |
          set +e

          echo "===== Environment ====="
          echo "Runner: $RUNNER_NAME"
          echo "Workspace: $GITHUB_WORKSPACE"
          pwd

          npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium

          EXIT_CODE=$?

          echo ""
          echo "=================================="
          echo "PLAYWRIGHT EXIT CODE = $EXIT_CODE"
          echo "=================================="

          ps -ef | grep -E "node|chrome|playwright" || true

          exit $EXIT_CODE

      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="${{ matrix.source }}-${{ matrix.plan }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"

          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"

          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi

          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi

          if [ -d playwright-report ]; then
            mkdir -p "$DEST/playwright-report"
            cp -R playwright-report/. "$DEST/playwright-report/"
          fi

          echo "=================================================="
          echo "LOCAL REPORT ARCHIVE SAVED"
          echo "Runner machine : $(hostname)"
          echo "Folder         : $DEST"
          echo "=================================================="

      - name: Upload Playwright Report
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.plan }}-${{ github.run_id }}-${{ github.job }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.plan }}-${{ github.run_id }}-${{ github.job }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
