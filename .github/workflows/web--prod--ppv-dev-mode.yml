name: "Web · Prod · PPV enabled · Dev mode"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: "PPV JSON filename (for example: ppv_t_joshua_prenga.json)"
        required: true
        type: string
      COUNTRY:
        description: "Country"
        required: true
        type: choice
        default: GB
        options: [GB, US, AU, BR, AE]
permissions: { contents: read }
env:
  JIRA_REGION: ${{ inputs.COUNTRY }}
  JIRA_REGION_FIELD_NAME: Region
  JIRA_DAZN_ENVIRONMENT_FIELD_NAME: DAZN Environment
  JIRA_PLATFORM_FIELD_NAME: Platform - required
  JIRA_DAZN_ENVIRONMENT: Live Prod
  JIRA_PLATFORM: Desktop Web
  JIRA_BASE_URL: https://livesport.atlassian.net
  JIRA_PROJECT_KEY: QAR
  JIRA_ISSUE_TYPE: Bug
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
jobs:
  prepare:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: node scripts/buildPpvWorkflowMatrix.js dev-account '${{ inputs.PPV_CONFIG }}' '${{ inputs.COUNTRY }}'
  my-account:
    needs: prepare
    environment: prod
    name: Dev mode My Account | ${{ matrix.profile }}
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PROFILE: ${{ matrix.profile }}
      LOGIN_FIRST: 'true'
      DEV_MODE_ON: 'on'
      SWITCH: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: dev-mode-my-account }
