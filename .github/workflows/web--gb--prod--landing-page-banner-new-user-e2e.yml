name: "Web · GB · Prod · New user — landing page banner"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  prod:
    name: landing-page-banner | ${{ matrix.plan }}

    environment:
      name: Jira Details

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 30


    environment: prod
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        plan:
          - standard_monthly
          - standard_apm
          - ultimate_apm
          - ultimate_upfront

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: GB
      DAZN_ENV: prod
      JIRA_REGION_FIELD_NAME: Region
      JIRA_DAZN_ENVIRONMENT_FIELD_NAME: DAZN Environment
      JIRA_PLATFORM_FIELD_NAME: Platform - required
      JIRA_DAZN_ENVIRONMENT: Live Prod
      JIRA_PLATFORM: Desktop Web
      SOURCE: landing-page-banner
      PLAN: ${{ matrix.plan }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ inputs.SWITCH }}


      JIRA_BASE_URL: https://livesport.atlassian.net
      JIRA_PROJECT_KEY: QAR
      JIRA_ISSUE_TYPE: Bug
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Run GB PROD Landing Page Banner PPV Flow
        shell: bash
        run: |
          set +e

          echo "===== Environment ====="
          echo "Runner: $RUNNER_NAME"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Region: $DAZN_REGION"
          echo "Environment: $DAZN_ENV"
          echo "Source: $SOURCE"
          echo "Plan: $PLAN"
          pwd

          npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium

          EXIT_CODE=$?

          echo ""
          echo "=================================="
          echo "PLAYWRIGHT EXIT CODE = $EXIT_CODE"
          echo "=================================="

          exit $EXIT_CODE

      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="landing-page-banner-${{ matrix.plan }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"

          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"

          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi

          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi

          if [ -d playwright-report ]; then
            mkdir -p "$DEST/playwright-report"
            cp -R playwright-report/. "$DEST/playwright-report/"
          fi

          echo "=================================================="
          echo "LOCAL REPORT ARCHIVE SAVED"
          echo "Runner machine : $(hostname)"
          echo "Folder         : $DEST"
          echo "=================================================="

      - name: Upload Playwright Report
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-landing-page-banner-${{ matrix.plan }}-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-landing-page-banner-${{ matrix.plan }}-${{ github.run_id }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
