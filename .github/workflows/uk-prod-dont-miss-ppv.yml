name: UK PROD Don't Miss PPV

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

permissions:
  contents: read

jobs:
  prod:
    name: PROD

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 15

    env:
      CI: 'true'
      HEADLESS: 'true'
DAZN_REGION: GB      DAZN_ENV: prod
      SOURCE: home-page-dont-miss
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          hostname

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies if needed
        run: |
          if [ ! -d node_modules ]; then
            npm ci
          fi

      - name: Verify Playwright
        run: npx playwright --version

      - name: Run UK Don't Miss PPV
        run: npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
