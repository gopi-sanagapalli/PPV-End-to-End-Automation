name: "Web · Prod · PPV live · All surfacing points"
run-name: "Web · Prod · PPV live · All surfacing points · ${{ inputs.COUNTRY }} · ${{ inputs.PPV_CONFIG }}"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: "PPV JSON filename (for example: ppv_t_joshua_prenga.json)"
        required: true
        type: string
      COUNTRY:
        description: "Country"
        required: true
        type: choice
        default: GB
        options: [GB, US, AU, BR, AE]
      BANNERS_CONFIGURED:
        description: "Banners Configured/Available"
        required: true
        type: choice
        default: "true"
        options: ["true", "false"]
permissions: { contents: read }
env:
  JIRA_REGION: ${{ inputs.COUNTRY }}
  JIRA_REGION_FIELD_NAME: Region
  JIRA_DAZN_ENVIRONMENT_FIELD_NAME: DAZN Environment
  JIRA_PLATFORM_FIELD_NAME: Platform - required
  JIRA_DAZN_ENVIRONMENT: Live Prod
  JIRA_PLATFORM: Desktop Web
  JIRA_BASE_URL: https://livesport.atlassian.net
  JIRA_PROJECT_KEY: QAR
  JIRA_ISSUE_TYPE: Bug
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
jobs:
  prepare:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    outputs:
      new_matrix: ${{ steps.matrix.outputs.new_matrix }}
      signin_matrix: ${{ steps.matrix.outputs.signin_matrix }}
      signed_matrix: ${{ steps.matrix.outputs.signed_matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: matrix
        shell: bash
        env:
          BANNERS_CONFIGURED: ${{ inputs.BANNERS_CONFIGURED }}
        run: |
          for mode in live-new live-existing live-signed; do
            file="$(mktemp)"
            GITHUB_OUTPUT="$file" node scripts/buildPpvWorkflowMatrix.js "$mode" '${{ inputs.PPV_CONFIG }}' '${{ inputs.COUNTRY }}'
            case "$mode" in
              live-new) key=new_matrix ;;
              live-existing) key=signin_matrix ;;
              live-signed) key=signed_matrix ;;
            esac
            sed "s/^matrix=/$key=/" "$file" >> "$GITHUB_OUTPUT"
            rm "$file"
          done
  new-user:
    needs: prepare
    environment: prod
    name: New user | ${{ matrix.source }} | ${{ matrix.plan }}
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.new_matrix) }}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PLAN: ${{ matrix.plan }}
      LOGIN_FIRST: 'false'
      DEV_MODE_ON: 'off'
      SWITCH: ${{ matrix.switch || 'false' }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: new-user }
  sign-in-during-flow:
    needs: prepare
    environment: prod
    name: Existing user · Sign in during flow | ${{ matrix.source }} | ${{ matrix.profile }}
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.signin_matrix) }}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PROFILE: ${{ matrix.profile }}
      LOGIN_FIRST: 'false'
      DEV_MODE_ON: 'off'
      SWITCH: ${{ matrix.switch || 'false' }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: sign-in-during-flow }
  already-signed-in:
    needs: prepare
    environment: prod
    name: Existing user · Already signed in | ${{ matrix.source }} | ${{ matrix.profile }}
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.signed_matrix) }}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PROFILE: ${{ matrix.profile }}
      LOGIN_FIRST: 'true'
      DEV_MODE_ON: 'off'
      SWITCH: ${{ matrix.switch || 'false' }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: already-signed-in }
  workflow-summary:
    needs: [prepare, new-user, sign-in-during-flow, already-signed-in]
    if: ${{ always() }}
    name: Consolidated workflow report · ${{ inputs.COUNTRY }}
    runs-on: [self-hosted, macOS, ARM64]
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ppv-workflow-summary
        with:
          title: Web PPV live workflow report · ${{ inputs.COUNTRY }}
          ppv_config: ${{ inputs.PPV_CONFIG }}
          country: ${{ inputs.COUNTRY }}
          artifact_pattern: ppv-web-*
          artifact_name: ppv-web-${{ inputs.COUNTRY }}-workflow-summary-${{ github.run_attempt }}
          new_user_status: ${{ needs.new-user.result }}
          sign_in_status: ${{ needs.sign-in-during-flow.result }}
          signed_in_status: ${{ needs.already-signed-in.result }}
