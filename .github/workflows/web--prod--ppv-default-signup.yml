name: "Web · Prod · PPV default signup"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: "PPV JSON filename (for example: ppv_t_joshua_prenga.json)"
        required: true
        type: string
      COUNTRY:
        description: "Country"
        required: true
        type: choice
        default: GB
        options: [GB, US, AU, BR, AE]
permissions: { contents: read }
jobs:
  prepare:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      new_matrix: ${{ steps.matrix.outputs.new_matrix }}
      signin_matrix: ${{ steps.matrix.outputs.signin_matrix }}
      signed_matrix: ${{ steps.matrix.outputs.signed_matrix }}
      dev_mode_on: ${{ steps.matrix.outputs.dev_mode_on }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        shell: bash
        run: |
          for mode in default-new default-signin default-signed; do
            file="$(mktemp)"
            GITHUB_OUTPUT="$file" node scripts/buildPpvWorkflowMatrix.js "$mode" '${{ inputs.PPV_CONFIG }}' '${{ inputs.COUNTRY }}'
            case "$mode" in default-new) key=new_matrix ;; default-signin) key=signin_matrix ;; default-signed) key=signed_matrix ;; esac
            sed "s/^matrix=/$key=/" "$file" >> "$GITHUB_OUTPUT"
            grep '^dev_mode_on=' "$file" >> "$GITHUB_OUTPUT" || true
            rm "$file"
          done
  new-user:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.new_matrix) }}
    name: New user | ${{ matrix.source }} | ${{ matrix.plan }}
    runs-on: [self-hosted, macOS, ARM64]
    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PLAN: ${{ matrix.plan }}
      LOGIN_FIRST: 'false'
      DEV_MODE_ON: ${{ needs.prepare.outputs.dev_mode_on }}
      SWITCH: 'false'
    steps:
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: new-user }
  sign-in-during-flow:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.signin_matrix) }}
    name: Sign in during flow | ${{ matrix.source }} | ${{ matrix.profile }}
    runs-on: [self-hosted, macOS, ARM64]
    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PROFILE: ${{ matrix.profile }}
      LOGIN_FIRST: 'false'
      DEV_MODE_ON: ${{ needs.prepare.outputs.dev_mode_on }}
      SWITCH: 'false'
    steps:
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: sign-in-during-flow }
  already-signed-in:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.signed_matrix) }}
    name: Already signed in | ${{ matrix.source }} | ${{ matrix.profile }}
    runs-on: [self-hosted, macOS, ARM64]
    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_ENV: prod
      DAZN_REGION: ${{ inputs.COUNTRY }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      SOURCE: ${{ matrix.source }}
      PROFILE: ${{ matrix.profile }}
      LOGIN_FIRST: 'true'
      DEV_MODE_ON: ${{ needs.prepare.outputs.dev_mode_on }}
      SWITCH: 'false'
    steps:
      - uses: ./.github/actions/ppv-generic-runner
        with: { journey: already-signed-in }
