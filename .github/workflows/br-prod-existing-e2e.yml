name: Existing User E2E - Sign In During Flow - BR - PROD

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  prod:
    name: ${{ matrix.source }} | ${{ matrix.plan }}

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 10

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        source:
          - landing-page-banner
          - landing-page-dont-miss-live

          - home-page-banner
          - home-page-dont-miss
          - home-biggest-fights
          - home-page-dazntile

          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - home-kickboxing-tile

          - boxing-page-banner
          - boxing-page-bundle
          - boxing-upcoming-fights
          - boxing-banner-ultimate
          - boxing-ultimate-subscription
          - boxing-standard-subscription
          - boxing-join-the-club

          - search
          - schedule
          - myaccount

        user_state:
          - freemium
          - frozen
          - active_standard
          - active_ultimate

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: BR
      DAZN_ENV: prod
      LOGIN_FIRST: 'false'
      SOURCE: ${{ matrix.source }}
      USER_STATE: ${{ matrix.user_state }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ inputs.SWITCH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies if needed
        run: |
          if [ ! -d node_modules ]; then
            npm ci
          fi

      - name: Verify Playwright
        run: npx playwright --version

      - name: Run PROD PPV Flow
        run: npx playwright test tests/existing_user/existinguser.ppv.spec.ts --project=chromium

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod-${{ matrix.plan }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-prod-${{ matrix.plan }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
