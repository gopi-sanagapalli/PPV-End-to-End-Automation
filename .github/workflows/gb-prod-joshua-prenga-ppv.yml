name: GB home page don't miss PPV New User

on:
  workflow_dispatch:
    inputs:
      DAZN_REGION:
        description: 'DAZN region to validate'
        required: true
        default: 'GB'
        type: choice
        options:
          - AU
          - GB
          - UAE
          - US
          - BR

      DAZN_ENV:
        description: 'Environment to run'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - stag
          - beta
          - all

      PLAN:
        description: 'Plan to run'
        required: true
        default: 'standard_monthly'
        type: choice
        options:
          - all
          - standard_monthly
          - standard_apm
          - ultimate_apm
          - ultimate_upfront

      SOURCE:
        description: 'Surfacing point to run'
        required: true
        default: 'home-page-dont-miss'
        type: choice
        options:
          - all
          - boxing-page-banner
          - boxing-page-bundle
          - boxing-upcoming-fights
          - home-biggest-fights
          - home-boxing-banner
          - home-boxing-tile
          - home-boxing-upcoming
          - home-kickboxing-tile
          - home-page-banner
          - home-page-dazntile
          - home-page-dont-miss
          - home-page-get-started
          - landing-page-banner
          - landing-page-dont-miss-live
          - my-account
          - schedule
          - search

      PAYMENT_METHOD:
        description: 'Payment method (only used for stag environment)'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  setup:
    name: Setup Execution Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ENVS='["stag", "prod", "beta"]'
          PLANS='["standard_monthly", "standard_apm", "ultimate_apm", "ultimate_upfront"]'
          SOURCES='["boxing-page-banner", "boxing-page-bundle", "boxing-upcoming-fights", "home-biggest-fights", "home-boxing-banner", "home-boxing-tile", "home-boxing-upcoming", "home-kickboxing-tile", "home-page-banner", "home-page-dazntile", "home-page-dont-miss", "home-page-get-started", "landing-page-banner", "landing-page-dont-miss-live", "my-account", "schedule", "search"]'

          if [ "${{ inputs.DAZN_ENV }}" != "all" ]; then
            ENVS='["${{ inputs.DAZN_ENV }}"]'
          fi
          if [ "${{ inputs.PLAN }}" != "all" ]; then
            PLANS='["${{ inputs.PLAN }}"]'
          fi
          if [ "${{ inputs.SOURCE }}" != "all" ]; then
            SOURCES='["${{ inputs.SOURCE }}"]'
          fi

          MATRIX_JSON="{\"dazn_env\":$ENVS,\"plan\":$PLANS,\"source\":$SOURCES}"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  run-tests:
    name: "${{ matrix.dazn_env }} | ${{ matrix.plan }} | ${{ matrix.source }}"
    needs: setup
    runs-on:
      - self-hosted
      - macOS
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: ${{ inputs.DAZN_REGION == 'UAE' && 'AE' || inputs.DAZN_REGION }}
      DAZN_ENV: ${{ matrix.dazn_env }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PLAN: ${{ matrix.plan }}
      SOURCE: ${{ matrix.source }}
      PAYMENT_METHOD: ${{ matrix.dazn_env == 'stag' && inputs.PAYMENT_METHOD || '' }}
      SWITCH: ${{ inputs.SWITCH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Verify Playwright
        run: npx playwright --version

      - name: Run PPV Flow
        run: npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.dazn_env }}-${{ matrix.plan }}-${{ matrix.source }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dazn_env }}-${{ matrix.plan }}-${{ matrix.source }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
