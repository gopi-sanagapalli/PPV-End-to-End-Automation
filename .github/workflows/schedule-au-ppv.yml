name: AU Schedule PPV New User

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key, for example aj_joshua_prenga.json'
        required: true
        default: 'aj_joshua_prenga.json'
      PAYMENT_METHOD:
        description: 'Payment method used on stag payment flow'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay
      SWITCH:
        description: 'On stag standard flows, switch to Ultimate from payment upsell banner'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  schedule-au:
    name: AU | schedule | ${{ matrix.dazn_env }} | ${{ matrix.plan }}
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        dazn_env: [stag, prod]
        plan:
          - standard_monthly
          - standard_apm
          - ultimate_apm
          - ultimate_upfront

    env:
      CI: 'true'
      HEADLESS: 'true'
      DAZN_REGION: AU
      DAZN_ENV: ${{ matrix.dazn_env }}
      SOURCE: schedule
      PLAN: ${{ matrix.plan }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG || 'aj_joshua_prenga.json' }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD || 'credit_card' }}
      SWITCH: ${{ inputs.SWITCH || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium chrome

      - name: Run AU schedule new-user PPV flow
        run: npx playwright test tests/new_user/newuser.ppv.spec.ts --project=chromium

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-AU-schedule-${{ matrix.dazn_env }}-${{ matrix.plan }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results, screenshots, videos, and Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-AU-schedule-${{ matrix.dazn_env }}-${{ matrix.plan }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
          retention-days: 30