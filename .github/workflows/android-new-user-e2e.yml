name: "Android — New User — All Surfacing Points"

on:
  workflow_dispatch:
    inputs:
      PPV_CONFIG:
        description: 'PPV config filename/key'
        required: true
        default: 'aj_joshua_prenga.json'

      PAYMENT_METHOD:
        description: 'Payment method'
        required: true
        default: 'credit_card'
        type: choice
        options:
          - credit_card
          - gpay

      SWITCH:
        description: 'Switch to Ultimate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  prod:
    name: ${{ matrix.source }} | ${{ matrix.plan }}

    runs-on:
      - self-hosted
      - macOS
      - ARM64

    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        # Android surfacing points that support new (unauthenticated) users
        source:
          - landing-page-banner
          - home-page-banner
          - home-page-dont-miss
          - home-page-tile
          - home-boxing-banner
          - home-boxing-upcoming
          - home-boxing-tile
          - boxing-page-banner
          - schedule
          - search

        plan:
          - standard_monthly
          - standard_apm
          - ultimate_apm
          - ultimate_upfront

    env:
      CI: 'true'
      DAZN_REGION: GB
      DAZN_ENV: prod
      SOURCE: ${{ matrix.source }}
      PLAN: ${{ matrix.plan }}
      PPV_CONFIG: ${{ inputs.PPV_CONFIG }}
      PAYMENT_METHOD: ${{ inputs.PAYMENT_METHOD }}
      SWITCH: ${{ inputs.SWITCH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Show Runner
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          hostname
          echo "Commit: $(git rev-parse HEAD)"

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Install Appium dependencies
        run: cd appium && npm ci

      - name: Log matrix context
        run: |
          echo "=============================="
          echo "SOURCE      = $SOURCE"
          echo "PLAN        = $PLAN"
          echo "PPV_CONFIG  = $PPV_CONFIG"
          echo "SWITCH      = $SWITCH"
          echo "=============================="

      - name: Run Android New User PPV Flow
        shell: bash
        run: |
          set +e

          cd appium
          npx wdio run config/wdio.android.conf.ts --spec tests/android/ppv.handoff.spec.ts

          EXIT_CODE=$?

          echo ""
          echo "=================================="
          echo "WDIO EXIT CODE = $EXIT_CODE"
          echo "=================================="

          exit $EXIT_CODE

      - name: Archive reports on runner disk
        if: always()
        shell: bash
        run: |
          REPORT_ROOT="$HOME/DAZN-CI-Reports"
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          JOB_NAME="${{ matrix.source }}-${{ matrix.plan }}"
          TIMESTAMP="$(date '+%Y-%m-%d_%H-%M-%S')"

          SAFE_WORKFLOW="$(echo "$WORKFLOW_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"
          SAFE_JOB="$(echo "$JOB_NAME" | tr ' /:|' '_' | tr -cd '[:alnum:]_.-')"

          DEST="$REPORT_ROOT/$SAFE_WORKFLOW/run-${RUN_NUMBER}-${RUN_ID}/$SAFE_JOB/$TIMESTAMP"

          mkdir -p "$DEST"

          if [ -d reports ]; then
            mkdir -p "$DEST/reports"
            cp -R reports/. "$DEST/reports/"
          fi

          if [ -d test-results ]; then
            mkdir -p "$DEST/test-results"
            cp -R test-results/. "$DEST/test-results/"
          fi

          echo "=================================================="
          echo "LOCAL REPORT ARCHIVE SAVED"
          echo "Runner machine : $(hostname)"
          echo "Folder         : $DEST"
          echo "=================================================="

      - name: Upload Results
        if: ${{ false }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.source }}-${{ matrix.plan }}-${{ github.run_id }}
          path: |
            test-results/
            reports/
          if-no-files-found: ignore
